name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── API: lint + test ────────────────────────────────────────────────────────
  api-check:
    name: API lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: chronicle_test
          POSTGRES_USER: chronicle
          POSTGRES_PASSWORD: chronicle
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: api/go.sum

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Vet
        working-directory: api
        run: go vet ./...

      - name: Staticcheck
        working-directory: api
        run: staticcheck ./...

      - name: Test
        working-directory: api
        run: go test -p 1 ./... -count=1 -race
        env:
          TEST_DATABASE_URL: postgres://chronicle:chronicle@localhost:5432/chronicle_test?sslmode=disable

  # ── API: build Docker image and push to GHCR ────────────────────────────────
  api-build:
    name: Build & push API image
    needs: api-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/chronicle-api
          tags: |
            type=sha,format=long

      - uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── API: migrate then deploy to Fly.io ──────────────────────────────────────
  api-deploy:
    name: Deploy API
    needs: api-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: api/go.sum

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run migrations
        working-directory: api
        run: goose -dir db/migrations postgres "$DATABASE_URL" up
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: api
        run: flyctl deploy --image ghcr.io/${{ github.repository_owner }}/chronicle-api:sha-${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Frontend: lint + typecheck + build ──────────────────────────────────────
  web-check:
    name: Frontend lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: web
        run: pnpm lint

      - name: Typecheck
        working-directory: web
        run: pnpm typecheck

      - name: Build
        working-directory: web
        run: pnpm build

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  # ── Frontend: deploy to Cloudflare Pages ────────────────────────────────────
  web-deploy:
    name: Deploy frontend
    needs: web-check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=chronicle-web --commit-dirty=true
